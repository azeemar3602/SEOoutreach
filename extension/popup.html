<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1d27;
      color: #e8eaef;
      padding: 14px;
    }
    h1 { font-size: 14px; margin-bottom: 4px; }
    .sub { font-size: 11px; color: #8b93a7; margin-bottom: 12px; }
    label { display: block; font-size: 11px; color: #8b93a7; margin-bottom: 10px; }
    select, input, textarea {
      width: 100%; margin-top: 4px; padding: 6px 8px;
      background: #0f1117; border: 1px solid #2a2f3d; border-radius: 6px;
      color: #e8eaef; font-size: 12px;
    }
    textarea { resize: vertical; }
    .info { background: #0f1117; border-radius: 6px; padding: 8px; margin-bottom: 10px; font-size: 11px; }
    .info strong { color: #5b8def; }
    .emails { margin-top: 4px; }
    .email-tag {
      display: inline-block; background: #2d3a5c; color: #8ab4ff;
      padding: 2px 6px; border-radius: 4px; font-size: 10px; margin: 2px 2px 0 0;
      cursor: pointer;
    }
    .email-tag:hover { background: #3d4a6c; }
    .btn {
      width: 100%; padding: 8px; border: none; border-radius: 6px;
      font-size: 12px; font-weight: 600; cursor: pointer; margin-top: 6px;
    }
    .btn-primary { background: #5b8def; color: #fff; }
    .btn-primary:hover { background: #4a7ad8; }
    .btn-ghost { background: transparent; color: #8b93a7; border: 1px solid #2a2f3d; }
    .status { font-size: 11px; margin-top: 8px; text-align: center; }
    .ok { color: #3ecf8e; }
    .err { color: #e57373; }
    .warn { color: #f5a623; font-size: 10px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <h1>Outreach Capture</h1>
  <p class="sub">Save to <span id="apiLabel">azbuilds.xyz</span></p>

  <p class="warn" id="serverWarn" style="display:none">
    Tool not running — start with <code>npm start</code> in backlink-outreach-tool
  </p>

  <div class="info" id="pageInfo">Scanning page...</div>

  <label>Project
    <select id="projectSelect"><option value="">Loading...</option></select>
  </label>

  <label>Contact email
    <input type="email" id="contactEmail" placeholder="editor@site.com">
  </label>

  <label>Link type
    <select id="linkType">
      <option value="guest_post">Guest post</option>
      <option value="editorial">Editorial</option>
      <option value="resource_page">Resource page</option>
      <option value="directory">Directory</option>
      <option value="forum">Forum</option>
      <option value="unknown">Unknown</option>
    </select>
  </label>

  <label>Notes
    <textarea id="notes" rows="2" placeholder="Pitch angle, guidelines noticed..."></textarea>
  </label>

  <button class="btn btn-primary" id="saveBtn">Save opportunity</button>
  <button class="btn btn-ghost" id="useLocalBtn">Toggle local / live server</button>
  <button class="btn btn-ghost" id="openToolBtn">Open dashboard</button>

  <p class="status" id="status"></p>
  <script src="popup.js"></script>
</body>
</html>
