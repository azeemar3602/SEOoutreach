<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset password — Backlink Outreach Tool</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="public-page">
  <div class="auth-wrap">
    <form class="auth-card" id="resetForm">
      <h1>New password</h1>
      <p class="auth-sub">Choose a strong password (8+ chars, letter + number).</p>
      <div class="form-error hidden" id="formError"></div>
      <input type="hidden" name="token" id="tokenField">
      <label>New password<input name="password" type="password" required></label>
      <label>Confirm password<input name="confirm_password" type="password" required></label>
      <button type="submit" class="btn btn-primary btn-block">Update password</button>
      <p class="auth-links"><a href="/login">Back to login</a></p>
    </form>
  </div>
  <script src="/shared.js"></script>
  <script>
    const token = new URLSearchParams(window.location.search).get('token');
    document.getElementById('tokenField').value = token || '';
    if (!token) {
      document.getElementById('formError').textContent = 'Missing reset token.';
      document.getElementById('formError').classList.remove('hidden');
    }

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('formError');
      errEl.classList.add('hidden');
      const data = Object.fromEntries(new FormData(e.target));
      try {
        const result = await api('/api/auth/reset-password', { method: 'POST', body: JSON.stringify(data) });
        window.location.href = result.redirect || '/login';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
