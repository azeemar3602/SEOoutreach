<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot password — Backlink Outreach Tool</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="public-page">
  <div class="auth-wrap">
    <form class="auth-card" id="forgotForm">
      <h1>Reset password</h1>
      <p class="auth-sub">Enter your email and we'll send reset instructions.</p>
      <div class="form-success hidden" id="formSuccess"></div>
      <div class="form-error hidden" id="formError"></div>
      <label>Email<input name="email" type="email" required></label>
      <button type="submit" class="btn btn-primary btn-block">Send reset link</button>
      <p class="auth-links"><a href="/login">Back to login</a></p>
    </form>
  </div>
  <script src="/shared.js"></script>
  <script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('formError');
      const okEl = document.getElementById('formSuccess');
      errEl.classList.add('hidden');
      okEl.classList.add('hidden');
      try {
        const result = await api('/api/auth/forgot-password', {
          method: 'POST',
          body: JSON.stringify({ email: new FormData(e.target).get('email') }),
        });
        okEl.textContent = result.message;
        okEl.classList.remove('hidden');
        e.target.reset();
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
