<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up — Backlink Outreach Tool</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="public-page">
  <div class="auth-wrap">
    <form class="auth-card" id="signupForm">
      <h1>Create account</h1>
      <p class="auth-sub">Start your workspace in seconds</p>
      <div class="form-error hidden" id="formError"></div>
      <label>Full name<input name="full_name" required></label>
      <label>Email<input name="email" type="email" required autocomplete="email"></label>
      <label>Password<input name="password" type="password" required autocomplete="new-password"></label>
      <label>Confirm password<input name="confirm_password" type="password" required></label>
      <label>Company / workspace<input name="workspace_name" required></label>
      <label>Website URL<input name="site_url" type="url" placeholder="https://yoursite.com"></label>
      <label>Plan
        <select name="plan_key" id="planSelect">
          <option value="starter">Starter — Free</option>
          <option value="pro">Pro — $29/mo</option>
          <option value="agency">Agency — $79/mo</option>
        </select>
      </label>
      <button type="submit" class="btn btn-primary btn-block">Create account</button>
      <p class="auth-links"><a href="/login">Already have an account?</a></p>
    </form>
  </div>
  <script src="/shared.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('plan')) document.getElementById('planSelect').value = params.get('plan');

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('formError');
      errEl.classList.add('hidden');
      const data = Object.fromEntries(new FormData(e.target));
      try {
        const result = await api('/api/auth/signup', { method: 'POST', body: JSON.stringify(data) });
        window.location.href = result.redirect || '/dashboard';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
